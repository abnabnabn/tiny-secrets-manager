name: Release Binaries

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            suffix: ""
            cmd: tar -czf
            ext: .tar.gz
          - os: linux
            arch: arm64
            suffix: ""
            cmd: tar -czf
            ext: .tar.gz
          - os: darwin
            arch: amd64
            suffix: ""
            cmd: tar -czf
            ext: .tar.gz
          - os: darwin
            arch: arm64
            suffix: ""
            cmd: tar -czf
            ext: .tar.gz
          - os: windows
            arch: amd64
            suffix: ".exe"
            cmd: zip -qj
            ext: .zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build Binaries
        run: |
          CLI_BINARY_NAME=tsm${{ matrix.suffix }}
          CLI_PACKAGE_NAME=tsm-cli-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          
          SERVER_BINARY_NAME=tiny-secrets-manager${{ matrix.suffix }}
          SERVER_PACKAGE_NAME=tiny-secrets-manager-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          
          # Get version from tag, stripping 'v' prefix
          VERSION=${GITHUB_REF_NAME#v}
          
          # Run prebuild to bundle assets into server code
          go run cmd/prebuild/main.go
          
          # Build optimized, statically linked binaries
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags="-s -w -X main.Version=${VERSION}" -trimpath -o bin/$CLI_BINARY_NAME ./cmd/tsm-cli/main.go
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags="-s -w -X main.Version=${VERSION}" -trimpath -o bin/$SERVER_BINARY_NAME ./cmd/tsm-server/main.go
          
          # Package the binaries
          cd bin
          ${{ matrix.cmd }} ../$CLI_PACKAGE_NAME $CLI_BINARY_NAME
          ${{ matrix.cmd }} ../$SERVER_PACKAGE_NAME $SERVER_BINARY_NAME
          cd ..
          
          echo "CLI_PACKAGE_NAME=$CLI_PACKAGE_NAME" >> $GITHUB_ENV
          echo "SERVER_PACKAGE_NAME=$SERVER_PACKAGE_NAME" >> $GITHUB_ENV

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.CLI_PACKAGE_NAME }}
            ${{ env.SERVER_PACKAGE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
