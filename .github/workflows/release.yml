name: Release Binaries

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build All Platforms
        run: |
          make build-all

      - name: Package Binaries
        run: |
          mkdir -p dist
          
          # macOS Apple Silicon
          tar -czf dist/tiny-secrets-manager-darwin-arm64.tar.gz -C bin/darwin-arm64 tiny-secrets-manager
          tar -czf dist/tsm-cli-darwin-arm64.tar.gz -C bin/darwin-arm64 tsm
          
          # Linux AMD64
          tar -czf dist/tiny-secrets-manager-linux-amd64.tar.gz -C bin/linux-amd64 tiny-secrets-manager
          tar -czf dist/tsm-cli-linux-amd64.tar.gz -C bin/linux-amd64 tsm
          
          # Linux ARM64
          tar -czf dist/tiny-secrets-manager-linux-arm64.tar.gz -C bin/linux-arm64 tiny-secrets-manager
          tar -czf dist/tsm-cli-linux-arm64.tar.gz -C bin/linux-arm64 tsm
          
          # Windows AMD64
          zip -qj dist/tiny-secrets-manager-windows-amd64.zip bin/windows-amd64/tiny-secrets-manager.exe
          zip -qj dist/tsm-cli-windows-amd64.zip bin/windows-amd64/tsm.exe
          
          # Windows ARM64
          zip -qj dist/tiny-secrets-manager-windows-arm64.zip bin/windows-arm64/tiny-secrets-manager.exe
          zip -qj dist/tsm-cli-windows-arm64.zip bin/windows-arm64/tsm.exe

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
